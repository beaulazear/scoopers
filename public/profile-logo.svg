<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Green background -->
  <rect width="500" height="500" fill="#00D084"/>

  <!-- Subtle circle background for depth -->
  <circle cx="250" cy="250" r="180" fill="#1A1A1A" opacity="0.08"/>

  <!-- Large S logo -->
  <text
    x="250"
    y="250"
    font-family="Lowraw, Arial, sans-serif"
    font-size="280"
    font-weight="900"
    fill="#1A1A1A"
    text-anchor="middle"
    dominant-baseline="central">
    S
  </text>
</svg>
